resolver 127.0.0.11 valid=10s;  # Docker's embedded DNS

server {
    listen 80;
    server_name _;

    # Serve the built Vue frontend
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — serve index.html for any unmatched route
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the scraper service
    location /api/scraper/ {
        set $scraper_upstream http://scraper:8000;
        rewrite ^/api/scraper/(.*) /$1 break;
        proxy_pass $scraper_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # Proxy API calls to the analyst agent service
    location /api/analyst/ {
        set $analyst_upstream http://analyst:8001;
        rewrite ^/api/analyst/(.*) /$1 break;
        proxy_pass $analyst_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # Proxy API calls to the strategist agent service
    location /api/strategist/ {
        set $strategist_upstream http://strategist:8002;
        rewrite ^/api/strategist/(.*) /$1 break;
        proxy_pass $strategist_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }
}
